<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 МАРТА / SPECIAL PROJECT</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --pink: #ffb7c5; --hot-pink: #ff8fa3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .ui { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #choice-screen { text-align: center; width: 100%; }
        .btns-row { display: flex; gap: 40px; margin-top: 50px; justify-content: center; align-items: center; min-height: 200px; position: relative; }
        
        .btn { padding: 15px 45px; border: 1px solid var(--pink); background: none; color: #fff; cursor: pointer; font-size: 18px; border-radius: 4px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #btn-no { position: absolute; transition: all 0.3s ease-out; white-space: nowrap; }
        #btn-yes { position: relative; font-weight: 800; background: var(--pink); color: #000; border: none; z-index: 101; }

        #quiz, #final { display: none; width: 90%; max-width: 450px; background: rgba(10, 10, 10, 0.85); padding: 40px; border: 1px solid #333; backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .q-title { font-size: 24px; margin-bottom: 30px; font-weight: 300; line-height: 1.4; color: var(--pink); text-align: center; }
        .option { width: 100%; padding: 16px; border: 1px solid #444; margin-bottom: 12px; background: rgba(255,255,255,0.03); color: #eee; text-align: left; cursor: pointer; transition: 0.3s; border-radius: 10px; }
        .option:hover { border-color: var(--pink); background: rgba(255, 183, 197, 0.1); transform: translateX(5px); }
        
        .final-header { font-size: 32px; font-weight: 800; color: var(--pink); margin-bottom: 20px; text-align: center; }
        .final-text { line-height: 1.8; font-size: 16px; color: #ccc; text-align: center; }
        .money-joke { margin-top: 30px; font-size: 12px; color: #444; border-top: 1px solid #222; padding-top: 20px; text-align: center; font-style: italic; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
    <div id="choice-screen">
        <h1 style="font-weight: 200; letter-spacing: 8px; font-size: 22px; color: #666;">8 МАРТА. НАЧНЕМ?</h1>
        <div class="btns-row">
            <button id="btn-yes" class="btn" onclick="startQuiz()">ДА</button>
            <button id="btn-no" class="btn">НЕТ</button>
        </div>
    </div>

    <div id="quiz">
        <div class="q-title" id="q-text"></div>
        <div id="options"></div>
    </div>

    <div id="final">
        <div class="final-header">С Праздником! ✨</div>
        <div class="final-text" id="final-msg"></div>
        <div class="money-joke">
            Прости, все деньги ушли на видеокарту, чтобы отрендерить эту красоту. <br> Сделано с любовью специально для тебя.
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, mouse = { x: -1000, y: -1000 }, state = 'dragon', yesScale = 1;

    // Настройки дракона
    const points = [];
    const numPoints = 50; 
    for(let i=0; i<numPoints; i++) points.push({x: -100, y: -100});

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();

    class SakuraPetal {
        constructor(x, y, isExplosion = false) {
            this.x = x; this.y = y;
            // Метеорная скорость в начале
            this.vx = isExplosion ? (Math.random() - 0.5) * 40 : (Math.random() - 0.5) * 2;
            this.vy = isExplosion ? (Math.random() - 0.5) * 40 : Math.random() * 2 + 1;
            this.size = Math.random() * 4 + 2;
            this.angle = Math.random() * Math.PI * 2;
            this.weight = Math.random() * 0.05 + 0.02;
            this.isExplosion = isExplosion;
            this.timer = 0;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.timer++;

            if (this.isExplosion) {
                // Резкое торможение через 30 кадров (метеор превращается в лепесток)
                if (this.timer > 20) {
                    this.vx *= 0.85;
                    this.vy = this.vy * 0.85 + 0.5; // Плавное опадание
                }
            } else {
                this.vy += this.weight;
            }

            if (this.y > h) this.y = -20;
            if (this.x > w) this.x = 0; else if (this.x < 0) this.x = w;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle + this.timer * 0.05);
            ctx.fillStyle = '#ffb7c5';
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size/1.5, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    let sakuras = [];

    // Логика кнопки НЕТ
    const btnNo = document.getElementById('btn-no');
    const btnYes = document.getElementById('btn-yes');

    const moveNo = () => {
        const x = Math.random() * (w - 200) + 100;
        const y = Math.random() * (h - 200) + 100;
        btnNo.style.left = x + 'px';
        btnNo.style.top = y + 'px';
        yesScale += 0.2;
        btnYes.style.transform = `scale(${yesScale})`;
    };

    btnNo.addEventListener('mouseover', moveNo);
    btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moveNo(); });

    // КВИЗ
    const quizData = [
        { q: "Как выглядит твоё идеальное утро?", a: ["Тишина и вкусный чай", "Объятия и завтрак", "Планирование великих дел"] },
        { q: "Если бы ты была стихией, то какой?", a: ["Теплый весенний ветер", "Морская волна", "Уютный огонь в камине"] },
        { q: "Что тебе сейчас нужнее всего?", a: ["Отдохнуть от суеты", "Миллион алых роз", "Просто услышать, что я лучшая"] }
    ];
    let curQ = 0;

    function startQuiz() {
        state = 'sakura';
        // Эффект взрыва
        points.forEach(p => {
            for(let i=0; i<8; i++) sakuras.push(new SakuraPetal(p.x, p.y, true));
        });
        
        document.getElementById('choice-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('choice-screen').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            renderQuiz();
        }, 300);

        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffb7c5', '#fff'] });
    }

    function renderQuiz() {
        if (curQ >= quizData.length) {
            showFinal();
            return;
        }
        document.getElementById('q-text').innerText = quizData[curQ].q;
        const container = document.getElementById('options');
        container.innerHTML = '';
        quizData[curQ].a.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option';
            b.innerText = opt;
            b.onclick = () => {
                curQ++;
                confetti({ particleCount: 30, spread: 40, colors: ['#ffb7c5'] });
                renderQuiz();
            };
            container.appendChild(b);
        });
    }

    function showFinal() {
        document.getElementById('quiz').style.display = 'none';
        const final = document.getElementById('final');
        final.style.display = 'block';
        document.getElementById('final-msg').innerText = "Пусть эта весна будет такой же легкой и красивой, как этот код. Ты заслуживаешь всего самого прекрасного!";
        
        // Постоянный дождь из лепестков
        setInterval(() => {
            sakuras.push(new SakuraPetal(Math.random() * w, -50));
        }, 100);
    }

    // Движение мыши
    const handleMove = (e) => {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = x; mouse.y = y;
    };
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);

    function drawDragon() {
        points[0].x += (mouse.x - points[0].x) * 0.2;
        points[0].y += (mouse.y - points[0].y) * 0.2;

        for (let i = 1; i < numPoints; i++) {
            const p = points[i];
            const prev = points[i-1];
            p.x += (prev.x - p.x) * 0.4;
            p.y += (prev.y - p.y) * 0.4;
            
            const size = (1 - i/numPoints) * 15 + 2;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(Math.sin(Date.now() * 0.005 + i * 0.1) * 0.2); // Живое покачивание
            ctx.fillStyle = `rgba(255, 183, 197, ${1 - i/numPoints})`;
            ctx.beginPath();
            ctx.ellipse(0, 0, size, size/1.8, 0, 0, Math.PI*2);
            ctx.fill();
            // Блик
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.ellipse(-size/4, -size/4, size/3, size/6, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    function anim() {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, 0, w, h);

        if (state === 'dragon') {
            drawDragon();
        } else {
            sakuras.forEach((s, i) => {
                s.update();
                s.draw();
                if (s.timer > 500) sakuras.splice(i, 1);
            });
        }
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
