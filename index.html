<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 МАРТА / DRAGON PROJECT</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --pink: #ffb7c5; --hot-pink: #ff8fa3; --bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        .ui { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Экран выбора */
        #choice-screen { text-align: center; width: 100%; }
        .btns-row { display: flex; gap: 30px; margin-top: 60px; justify-content: center; align-items: center; min-height: 150px; }
        .btn { padding: 16px 45px; border: 2px solid var(--pink); background: none; color: #fff; cursor: pointer; font-size: 18px; border-radius: 50px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s; }
        #btn-yes { background: var(--pink); color: #000; font-weight: 800; border: none; box-shadow: 0 0 20px rgba(255,183,197,0.4); }
        #btn-no { position: relative; }

        /* Тест и Финал */
        #quiz, #final { display: none; width: 92%; max-width: 500px; background: rgba(15, 15, 15, 0.95); padding: 40px; border: 1px solid #333; backdrop-filter: blur(20px); border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .q-title { font-size: 26px; margin-bottom: 25px; color: var(--pink); font-weight: 300; line-height: 1.3; }
        .option { width: 100%; padding: 18px; border: 1px solid #444; margin-bottom: 12px; background: rgba(255,255,255,0.03); color: #eee; text-align: left; cursor: pointer; border-radius: 15px; transition: 0.3s; font-size: 16px; }
        .option:hover { border-color: var(--pink); background: rgba(255,183,197,0.1); transform: scale(1.02); color: #fff; }
        
        .final-header { font-size: 32px; font-weight: 800; color: var(--pink); margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,183,197,0.5); }
        .final-text { line-height: 1.8; font-size: 17px; color: #ddd; margin-bottom: 25px; }
        .money-joke { font-size: 13px; color: #666; border-top: 1px solid #222; padding-top: 25px; line-height: 1.6; font-style: italic; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
    <div id="choice-screen">
        <h1 style="font-weight: 100; letter-spacing: 12px; color: #666; font-size: 20px; margin-bottom: 10px;">PROJECT_SPRING_2026</h1>
        <h2 style="font-weight: 800; font-size: 32px; color: #fff;">ГОТОВА?</h2>
        <div class="btns-row">
            <button id="btn-yes" class="btn" onclick="startQuiz()">ДА</button>
            <button id="btn-no" class="btn">НЕТ</button>
        </div>
    </div>

    <div id="quiz">
        <div class="q-title" id="q-text"></div>
        <div id="options"></div>
    </div>

    <div id="final">
        <div class="final-header">С 8 Марта! ✨</div>
        <div class="final-text" id="final-msg"></div>
        <div class="money-joke">
            К сожалению, денег на нормальный подарок не было, поэтому я потратил несколько часов, чтобы собрать тебе эту программу. Надеюсь, это стоит дороже, чем любой букет из магазина.
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, mouse = { x: -500, y: -500 }, state = 'dragon', yesScale = 1;

    // Параметры детализированного дракона
    const numPoints = 45;
    const points = [];
    for(let i=0; i<numPoints; i++) points.push({x: -500, y: -500, angle: 0});

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        mouse.x = w/2; mouse.y = h/2;
    }
    window.addEventListener('resize', init);
    init();

    class SakuraPetal {
        constructor(x, y, isBurst = false) {
            this.x = x; this.y = y;
            this.vx = isBurst ? (Math.random() - 0.5) * 50 : (Math.random() - 0.5) * 3;
            this.vy = isBurst ? (Math.random() - 0.5) * 50 : Math.random() * 2 + 1;
            this.size = Math.random() * 4 + 2;
            this.rot = Math.random() * Math.PI * 2;
            this.timer = 0;
            this.isBurst = isBurst;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.timer++;
            if(this.isBurst && this.timer > 15) {
                this.vx *= 0.9; this.vy = this.vy * 0.9 + 0.6; // Торможение метеора
            }
            if(this.y > h + 10) this.y = -10;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rot + this.timer * 0.05);
            ctx.fillStyle = '#ffb7c5';
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size/1.5, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    let sakuras = [];

    // Логика кнопок
    const btnNo = document.getElementById('btn-no');
    const btnYes = document.getElementById('btn-yes');

    const moveNo = () => {
        btnNo.style.position = 'fixed';
        btnNo.style.left = Math.random() * (w - 150) + 'px';
        btnNo.style.top = Math.random() * (h - 100) + 'px';
        yesScale += 0.3;
        btnYes.style.transform = `scale(${yesScale})`;
    };
    btnNo.onmouseover = moveNo;

    // Квиз
    const quizData = [
        { q: "Если бы твоя весна была фильмом, какой бы это был жанр?", a: ["Романтическая комедия", "Загадочное фэнтези", "Приключение в поисках счастья"] },
        { q: "Представь, что ты — королева. Какое твое первое распоряжение?", a: ["Всем подарить выходной и сладости", "Объявить весну вечной", "Сделать комплименты обязательными"] },
        { q: "В чем твоя главная суперсила этой весной?", a: ["В умении вдохновлять", "В нежности и тепле", "В магической способности всё успевать"] },
        { q: "Какой подарок от жизни ты ждешь больше всего?", a: ["Больше ярких путешествий", "Душевного спокойствия", "Море внимания и любви"] }
    ];
    let curQ = 0;

    function startQuiz() {
        state = 'sakura';
        points.forEach(p => {
            for(let i=0; i<6; i++) sakuras.push(new SakuraPetal(p.x, p.y, true));
        });
        document.getElementById('choice-screen').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        confetti({ particleCount: 250, spread: 90, origin: { y: 0.7 }, colors: ['#ffb7c5', '#fff'] });
        renderQuiz();
    }

    function renderQuiz() {
        if (curQ >= quizData.length) {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('final').style.display = 'block';
            document.getElementById('final-msg').innerHTML = "Ты — настоящее украшение этой весны. Пусть каждый твой день будет таким же ярким и волшебным, как этот момент. Расцветай, сияй и помни, что ты способна на всё!";
            return;
        }
        document.getElementById('q-text').innerText = quizData[curQ].q;
        const box = document.getElementById('options');
        box.innerHTML = '';
        quizData[curQ].a.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option'; b.innerText = opt;
            b.onclick = () => { 
                confetti({ particleCount: 40, spread: 50, colors: ['#ffb7c5'] });
                curQ++; 
                renderQuiz(); 
            };
            box.appendChild(b);
        });
    }

    function drawDragon() {
        // Голова
        points[0].x += (mouse.x - points[0].x) * 0.15;
        points[0].y += (mouse.y - points[0].y) * 0.15;

        for (let i = 1; i < numPoints; i++) {
            const p = points[i];
            const prev = points[i-1];
            p.x += (prev.x - p.x) * 0.4;
            p.y += (prev.y - p.y) * 0.4;
            p.angle = Math.atan2(p.y - prev.y, p.x - prev.x);

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);

            // Тело (позвонки)
            const size = (1 - i/numPoints) * 20 + 2;
            ctx.fillStyle = `rgba(255, 255, 255, ${1 - i/numPoints})`;
            ctx.beginPath();
            ctx.ellipse(0, 0, size/1.5, size, 0, 0, Math.PI*2);
            ctx.fill();

            // Крылья (на 8-м и 15-м сегменте)
            if (i === 8 || i === 14) {
                const wingLen = (i === 8) ? 80 : 50;
                const wave = Math.sin(Date.now() * 0.01) * 20;
                ctx.strokeStyle = `rgba(255, 183, 197, ${0.8 - i/numPoints})`;
                ctx.lineWidth = 2;
                // Верхнее крыло
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-20, -wingLen + wave, 40, -wingLen - 20 + wave, 10, 0);
                ctx.stroke();
                // Нижнее
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-20, wingLen - wave, 40, wingLen + 20 - wave, 10, 0);
                ctx.stroke();
            }

            // Лапки (на 5 и 20 сегменте)
            if (i === 5 || i === 20) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(10, 15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(10, -15); ctx.stroke();
            }

            // Голова (декор)
            if (i === 1) {
                ctx.fillStyle = '#ffb7c5';
                ctx.beginPath(); ctx.arc(-5, -5, 2, 0, 7); ctx.fill(); // Глаза
                ctx.beginPath(); ctx.arc(-5, 5, 2, 0, 7); ctx.fill();
            }

            ctx.restore();
        }
    }

    function anim() {
        ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
        ctx.fillRect(0, 0, w, h);

        if (state === 'dragon') {
            drawDragon();
        } else {
            sakuras.forEach(s => { s.update(); s.draw(); });
            if(sakuras.length < 150 && Math.random() < 0.2) {
                sakuras.push(new SakuraPetal(Math.random()*w, -20));
            }
        }
        requestAnimationFrame(anim);
    }

    const updateMouse = e => {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = x; mouse.y = y;
    };
    window.addEventListener('mousemove', updateMouse);
    window.addEventListener('touchmove', updateMouse);

    anim();
</script>
</body>
</html>
