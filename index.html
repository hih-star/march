<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 МАРТА | SPECIAL</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --pink: #ffb7c5; --hot-pink: #ff8fa3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        .ui-layer { 
            position: relative; z-index: 10; width: 100%; height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: none; 
        }
        .container { pointer-events: auto; }

        /* Экраны */
        #start-screen { text-align: center; }
        #start-screen h1 { font-size: 48px; font-weight: 900; margin-bottom: 40px; letter-spacing: -2px; }
        
        .btns-row { display: flex; gap: 25px; justify-content: center; align-items: center; min-height: 150px; position: relative; }
        
        .btn-main { 
            padding: 20px 60px; border: 2px solid var(--pink); background: none; 
            color: #fff; cursor: pointer; font-size: 22px; border-radius: 16px; 
            font-weight: 800; transition: transform 0.2s, background 0.3s; 
        }
        #btn-yes { background: var(--pink); color: #000; border: none; box-shadow: 0 10px 30px rgba(255,183,197,0.4); z-index: 50; }
        #btn-no { position: relative; z-index: 10; transition: all 0.2s ease-out; }

        /* Стили теста */
        #quiz-box, #final-box { 
            display: none; width: 90%; max-width: 500px; 
            background: rgba(15, 15, 15, 0.95); padding: 45px; 
            border: 1px solid #333; backdrop-filter: blur(20px); 
            border-radius: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
        }

        .q-header { color: var(--pink); font-size: 13px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; display: block; }
        .q-title { font-size: 26px; font-weight: 700; line-height: 1.3; margin-bottom: 35px; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .opt-item { 
            width: 100%; padding: 18px; border: 1px solid #444; 
            background: rgba(255,255,255,0.02); color: #eee; 
            text-align: left; cursor: pointer; border-radius: 15px; 
            font-size: 17px; transition: all 0.3s;
        }
        .opt-item:hover { border-color: var(--pink); background: rgba(255,183,197,0.1); transform: translateX(8px); color: #fff; }

        /* Финал */
        .final-title { font-size: 38px; color: var(--pink); font-weight: 900; margin-bottom: 25px; }
        .final-msg { line-height: 1.8; font-size: 18px; color: #ddd; margin-bottom: 30px; }
        .joke-text { 
            font-size: 13px; color: #555; border-top: 1px solid #222; 
            padding-top: 25px; line-height: 1.6; font-style: italic; 
        }

        /* Анимация появления */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui-layer">
    <div class="container">
        <!-- Стартовый экран -->
        <div id="start-screen">
            <h1 class="fade-in">НАЧНЕМ?</h1>
            <div class="btns-row">
                <button id="btn-yes" class="btn-main" onclick="startExperience()">ДА</button>
                <button id="btn-no" class="btn-main">НЕТ</button>
            </div>
        </div>

        <!-- Экран теста -->
        <div id="quiz-box" class="fade-in">
            <span class="q-header" id="q-counter">Вопрос 1 из 4</span>
            <div class="q-title" id="q-text">Загрузка вопроса...</div>
            <div class="options-list" id="q-options">
                <!-- Сюда JS вставит кнопки -->
            </div>
        </div>

        <!-- Экран финала -->
        <div id="final-box" class="fade-in">
            <h2 class="final-title">С твоим днем! ✨</h2>
            <p class="final-msg" id="final-congrats"></p>
            <p class="joke-text">
                К сожалению денег на нормальный подарок не было, поэтому я потратил несколько часов, чтобы собрать тебе эту программу. Надеюсь, это стоит дороже, чем любой букет из магазина.
            </p>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, mouse = { x: -1000, y: -1000 }, state = 'dragon', yesScale = 1;

    // --- НАСТРОЙКИ ДРАКОНА ---
    const segments = [];
    const numSegments = 50;
    for(let i=0; i<numSegments; i++) segments.push({x: -200, y: -200, angle: 0});

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();

    function drawDragon() {
        segments.x += (mouse.x - segments.x) * 0.15;
        segments.y += (mouse.y - segments.y) * 0.15;

        for (let i = 1; i < numSegments; i++) {
            const seg = segments[i];
            const prev = segments[i-1];
            const dx = prev.x - seg.x;
            const dy = prev.y - seg.y;
            const angle = Math.atan2(dy, dx);
            seg.angle = angle;

            const dist = 12;
            seg.x = prev.x - Math.cos(angle) * dist;
            seg.y = prev.y - Math.sin(angle) * dist;

            ctx.save();
            ctx.translate(seg.x, seg.y);
            ctx.rotate(angle);

            const progress = i / numSegments;
            const size = (1 - progress) * 22 + 2;

            // Рисуем чешую из лепестков (по кругу для объема)
            for(let j=0; j<6; j++) {
                ctx.save();
                ctx.rotate((j / 6) * Math.PI * 2);
                ctx.translate(size * 0.5, 0);
                ctx.fillStyle = i < 5 ? '#fff' : `rgba(255, 183, 197, ${1 - progress})`;
                ctx.beginPath();
                ctx.ellipse(0, 0, size/1.8, size/3, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }

            // Крылья (12 и 20 сегменты)
            if (i === 12 || i === 20) {
                const wSize = i === 12 ? 150 : 90;
                const flap = Math.sin(Date.now() * 0.008) * 35;
                ctx.strokeStyle = `rgba(255, 183, 197, ${0.7 - progress})`;
                ctx.lineWidth = 2;
                for(let s of [-1, 1]) {
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-40, s * (wSize + flap), 120, s * (wSize + 60), 20, 0);
                    ctx.stroke();
                }
            }

            // Детали головы
            if (i === 1) {
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-8, -8, 3, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.arc(-8, 8, 3, 0, 7); ctx.fill();
                // Усы
                ctx.strokeStyle = '#ffb7c5';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(50, -40, 70, -20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(50, 40, 70, 20); ctx.stroke();
            }

            ctx.restore();
        }
    }

    // --- ЛЕПЕСТКИ (МЕТЕОРЫ) ---
    class Petal {
        constructor(x, y, burst = false) {
            this.x = x; this.y = y;
            this.vx = burst ? (Math.random() - 0.5) * 65 : (Math.random() - 0.5) * 4;
            this.vy = burst ? (Math.random() - 0.5) * 65 : Math.random() * 2 + 1;
            this.size = Math.random() * 4 + 3;
            this.rot = Math.random() * Math.PI * 2;
            this.timer = 0;
            this.burst = burst;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.timer++;
            if (this.burst && this.timer > 12) {
                this.vx *= 0.88; this.vy = this.vy * 0.88 + 0.6;
            }
            if (this.y > h + 20) this.y = -20;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rot + this.timer * 0.04);
            ctx.fillStyle = '#ffb7c5';
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size/1.7, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    let petals = [];

    // --- ЛОГИКА ТЕСТА (ГЛАВНОЕ) ---
    const quizData = [
        { q: "Как выглядит твоё идеальное весеннее утро?", a: ["С кофе и тишины", "С охапки тюльпанов", "С теплых объятий"] },
        { q: "Если бы ты была стихией, то какой?", a: ["Ласковый ветерок", "Горная река", "Яркое солнце"] },
        { q: "В чем твоя суперсила сегодня?", a: ["Вдохновлять окружающих", "Дарить тепло и уют", "Создавать магию вокруг"] },
        { q: "Что важнее всего в этот праздник?", a: ["Верить в мечту", "Чувствовать любовь", "Просто быть собой"] }
    ];
    let currentStep = 0;

    function startExperience() {
        state = 'sakura';
        // Взрыв метеоров из дракона
        segments.forEach(s => {
            for(let i=0; i<8; i++) petals.push(new Petal(s.x, s.y, true));
        });

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.7 }, colors: ['#ffb7c5', '#ffffff'] });
        renderQuestion();
    }

    function renderQuestion() {
        if (currentStep >= quizData.length) {
            showFinal();
            return;
        }

        const data = quizData[currentStep];
        document.getElementById('q-counter').innerText = `Вопрос ${currentStep + 1} из ${quizData.length}`;
        document.getElementById('q-text').innerText = data.q;
        
        const optionsBox = document.getElementById('q-options');
        optionsBox.innerHTML = ''; // Очистка старых кнопок

        data.a.forEach(ans => {
            const btn = document.createElement('button');
            btn.className = 'opt-item';
            btn.innerText = ans;
            btn.onclick = () => {
                confetti({ particleCount: 35, spread: 50, colors: ['#ffb7c5'] });
                currentStep++;
                renderQuestion(); // Переход к следующему вопросу
            };
            optionsBox.appendChild(btn);
        });
    }

    function showFinal() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('final-box').style.display = 'block';
        document.getElementById('final-congrats').innerText = "Ты — самое прекрасное чудо этой весны. Пусть каждый твой день будет наполнен светом, нежностью и бесконечным вдохновением. Цвети, сияй и знай, что ты неповторима!";
        
        // Постоянный листопад в конце
        setInterval(() => {
            if (petals.length < 200) petals.push(new Petal(Math.random() * w, -20));
        }, 100);
    }

    // --- КНОПКА НЕТ ---
    const btnNo = document.getElementById('btn-no');
    const btnYes = document.getElementById('btn-yes');

    btnNo.onmouseover = () => {
        btnNo.style.position = 'fixed';
        btnNo.style.left = Math.random() * (w - 200) + 100 + 'px';
        btnNo.style.top = Math.random() * (h - 100) + 50 + 'px';
        yesScale += 0.4;
        btnYes.style.transform = `scale(${yesScale})`;
    };

    // --- ОСНОВНОЙ ЦИКЛ ---
    function loop() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.18)';
        ctx.fillRect(0, 0, w, h);

        if (state === 'dragon') {
            drawDragon();
        } else {
            petals.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.timer > 600) petals.splice(i, 1);
            });
        }
        requestAnimationFrame(loop);
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', e => { 
        mouse.x = e.touches[0].clientX; 
        mouse.y = e.touches[0].clientY; 
    });

    loop();
</script>
</body>
</html>
