<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 МАРТА</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --pink: #ffb7c5; --accent: #ff8fa3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #050505; color: #fff; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        .ui { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .ui > * { pointer-events: auto; }

        /* Начальный экран */
        #start-screen { text-align: center; transition: opacity 0.5s; }
        #start-screen h1 { font-size: 40px; font-weight: 900; letter-spacing: -1px; margin-bottom: 30px; text-shadow: 0 0 20px rgba(255,183,197,0.3); }
        .btns { display: flex; gap: 20px; justify-content: center; align-items: center; min-height: 120px; }
        
        .btn { padding: 18px 50px; border: 2px solid var(--pink); background: none; color: #fff; cursor: pointer; font-size: 18px; border-radius: 12px; transition: transform 0.1s, background 0.3s; font-weight: 700; }
        #btn-yes { background: var(--pink); color: #000; border: none; box-shadow: 0 10px 30px rgba(255,183,197,0.4); }
        #btn-no { position: relative; z-index: 5; }

        /* ТЕСТ */
        #quiz, #final { 
            display: none; width: 90%; max-width: 500px; 
            background: rgba(10, 10, 10, 0.95); padding: 40px; 
            border: 1px solid #333; backdrop-filter: blur(20px); 
            border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .q-count { color: var(--pink); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .q-text { font-size: 24px; font-weight: 600; line-height: 1.3; margin-bottom: 30px; }
        .options { display: grid; gap: 12px; }
        .opt-btn { 
            padding: 18px; border: 1px solid #444; background: rgba(255,255,255,0.03); 
            color: #ccc; text-align: left; cursor: pointer; border-radius: 15px; 
            font-size: 16px; transition: 0.2s;
        }
        .opt-btn:hover { border-color: var(--pink); color: #fff; background: rgba(255,183,197,0.1); transform: translateX(5px); }

        /* ФИНАЛ */
        .final-title { font-size: 36px; color: var(--pink); margin-bottom: 20px; font-weight: 900; }
        .final-msg { line-height: 1.8; color: #ddd; font-size: 17px; margin-bottom: 30px; }
        .footer-note { font-size: 13px; color: #555; border-top: 1px solid #222; padding-top: 25px; line-height: 1.6; font-style: italic; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
    <div id="start-screen">
        <h1>НАЧНЕМ?</h1>
        <div class="btns">
            <button id="btn-yes" class="btn" onclick="startFlow()">ДА</button>
            <button id="btn-no" class="btn">НЕТ</button>
        </div>
    </div>

    <div id="quiz">
        <span class="q-count" id="q-num">Вопрос 1 из 4</span>
        <div class="q-text" id="q-text"></div>
        <div class="options" id="q-options"></div>
    </div>

    <div id="final">
        <div class="final-title">С твоим днем! ✨</div>
        <div class="final-msg" id="res-text"></div>
        <div class="footer-note">
            К сожалению денег на нормальный подарок не было, поэтому я потратил несколько часов, чтобы собрать тебе эту программу. Надеюсь, это стоит дороже, чем любой букет из магазина.
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, mouse = { x: -1000, y: -1000 }, state = 'dragon', yesScale = 1;

    // --- ЛОГИКА ДРАКОНА (ИНВЕРСНАЯ КИНЕМАТИКА) ---
    const segments = [];
    const numSegments = 55;
    for(let i=0; i<numSegments; i++) segments.push({x: -100, y: -100, angle: 0, width: 0});

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        mouse.x = w/2; mouse.y = h/2;
    }
    window.addEventListener('resize', init);
    init();

    function drawDragon() {
        segments[0].x += (mouse.x - segments[0].x) * 0.15;
        segments[0].y += (mouse.y - segments[0].y) * 0.15;

        for (let i = 1; i < numSegments; i++) {
            const seg = segments[i];
            const prev = segments[i-1];
            const dx = prev.x - seg.x;
            const dy = prev.y - seg.y;
            const distance = Math.sqrt(dx*dx + dy*dy);
            const angle = Math.atan2(dy, dx);
            seg.angle = angle;

            const targetDist = 12; 
            if (distance > targetDist) {
                seg.x = prev.x - Math.cos(angle) * targetDist;
                seg.y = prev.y - Math.sin(angle) * targetDist;
            }

            ctx.save();
            ctx.translate(seg.x, seg.y);
            ctx.rotate(angle);

            const size = Math.max(2, (1 - i/numSegments) * 22);
            
            // Крылья (Сегменты 10 и 18)
            if (i === 10 || i === 18) {
                const wingSize = (i === 10) ? 140 : 90;
                const flap = Math.sin(Date.now() * 0.008) * 30;
                ctx.strokeStyle = `rgba(255, 183, 197, ${0.6 - i/numSegments})`;
                ctx.lineWidth = 3;
                // Верхнее крыло
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-40, -wingSize + flap, 80, -wingSize - 40 + flap, 10, 0);
                ctx.stroke();
                // Нижнее крыло
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-40, wingSize - flap, 80, wingSize + 40 - flap, 10, 0);
                ctx.stroke();
            }

            // Ребра / Шипы
            if (i % 3 === 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 - i/numSegments})`;
                ctx.fillRect(0, -size*1.5, 2, size*3);
            }

            // Тело
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(1, i < 5 ? '#ffb7c5' : '#111');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, size/1.2, size, 0, 0, Math.PI*2);
            ctx.fill();

            // Лапы (Сегменты 7 и 25)
            if (i === 7 || i === 25) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, size); ctx.lineTo(15, size+15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(15, -size-15); ctx.stroke();
            }

            // Голова
            if (i === 1) {
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-8, -8, 3, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.arc(-8, 8, 3, 0, 7); ctx.fill();
                // Рога
                ctx.strokeStyle = '#ffb7c5';
                ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(20, -25); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(20, 25); ctx.stroke();
            }

            ctx.restore();
        }
    }

    // --- ЛЕПЕСТКИ (МЕТЕОРНЫЙ ЭФФЕКТ) ---
    class Petal {
        constructor(x, y, burst = false) {
            this.x = x; this.y = y;
            this.vx = burst ? (Math.random() - 0.5) * 60 : (Math.random() - 0.5) * 4;
            this.vy = burst ? (Math.random() - 0.5) * 60 : Math.random() * 2 + 1;
            this.size = Math.random() * 4 + 3;
            this.rot = Math.random() * Math.PI * 2;
            this.life = 0;
            this.burst = burst;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.life++;
            if (this.burst && this.life > 10) {
                this.vx *= 0.85; this.vy = this.vy * 0.85 + 0.6;
            }
            if (this.y > h + 20) this.y = -20;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rot + this.life * 0.03);
            ctx.fillStyle = '#ffb7c5';
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size/1.7, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    let petals = [];

    // --- УПРАВЛЕНИЕ КНОПКАМИ ---
    const btnNo = document.getElementById('btn-no');
    const btnYes = document.getElementById('btn-yes');

    btnNo.onmouseover = () => {
        btnNo.style.position = 'fixed';
        btnNo.style.left = Math.random() * (w - 150) + 'px';
        btnNo.style.top = Math.random() * (h - 100) + 'px';
        yesScale += 0.3;
        btnYes.style.transform = `scale(${yesScale})`;
    };

    // --- ТЕСТ (ЛОГИКА) ---
    const quizData = [
        { q: "Как выглядит твоё идеальное весеннее утро?", a: ["Кофе в тишине", "Завтрак в постель", "Прогулка на солнце"] },
        { q: "Если бы ты была стихией, то какой?", a: ["Теплый ветерок", "Горный поток", "Искрящийся огонь"] },
        { q: "Что важнее всего в этот праздник?", a: ["Тортик!", "Внимание и забота", "Ощущение весны"] },
        { q: "Какое желание загадаем на эту весну?", a: ["Больше путешествий", "Душевный покой", "Миллион улыбок"] }
    ];
    let currentStep = 0;

    function startFlow() {
        state = 'sakura';
        segments.forEach(s => {
            for(let i=0; i<8; i++) petals.push(new Petal(s.x, s.y, true));
        });
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 }, colors: ['#ffb7c5', '#fff'] });
        showQuestion();
    }

    function showQuestion() {
        if (currentStep >= quizData.length) {
            showFinal();
            return;
        }
        const data = quizData[currentStep];
        document.getElementById('q-num').innerText = `Вопрос ${currentStep + 1} из ${quizData.length}`;
        document.getElementById('q-text').innerText = data.q;
        const optionsBox = document.getElementById('q-options');
        optionsBox.innerHTML = '';
        
        data.a.forEach(ans => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = ans;
            b.onclick = () => {
                confetti({ particleCount: 30, spread: 50, colors: ['#ffb7c5'] });
                currentStep++;
                showQuestion();
            };
            optionsBox.appendChild(b);
        });
    }

    function showFinal() {
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('final').style.display = 'block';
        document.getElementById('res-text').innerText = "Пусть твоя жизнь будет такой же захватывающей, как этот полет дракона, и такой же нежной, как лепестки сакуры. Ты достойна всего самого прекрасного, и пусть эта весна исполнит все твои мечты!";
        
        setInterval(() => {
            if(petals.length < 200) petals.push(new Petal(Math.random()*w, -20));
        }, 100);
    }

    // --- ГЛАВНЫЙ ЦИКЛ ---
    function anim() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
        ctx.fillRect(0, 0, w, h);

        if (state === 'dragon') {
            drawDragon();
        } else {
            petals.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life > 500) petals.splice(i, 1);
            });
        }
        requestAnimationFrame(anim);
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', e => { 
        mouse.x = e.touches[0].clientX; 
        mouse.y = e.touches[0].clientY; 
    });

    anim();
</script>
</body>
</html>
