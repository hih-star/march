<!-- Добавь это в head, если еще нет, для работы конфетти -->
<script src="https://cdn.jsdelivr.net"></script>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, state = 'dragon', yesScale = 1;
    let mouse = { x: -1000, y: -1000 };

    const segments = [];
    const numSegments = 55;
    for(let i=0; i<numSegments; i++) segments.push({ x: -200, y: -200, angle: 0 });

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- ЛОГИКА ДРАКОНА ---
    function drawDragon() {
        segments[0].x += (mouse.x - segments[0].x) * 0.15;
        segments[0].y += (mouse.y - segments[0].y) * 0.15;

        for (let i = 1; i < numSegments; i++) {
            const s = segments[i], p = segments[i-1];
            const angle = Math.atan2(p.y - s.y, p.x - s.x);
            s.angle = angle;
            s.x = p.x - Math.cos(angle) * 12;
            s.y = p.y - Math.sin(angle) * 12;

            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(angle);
            const prg = i / numSegments;
            const sz = (1 - prg) * 20 + 2;

            if (i === 1) {
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.moveTo(15,0); ctx.bezierCurveTo(35,-25,-25,-25,-30,0); ctx.bezierCurveTo(-25,25,35,25,15,0); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-8,-6,3,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(-8,6,3,0,7); ctx.fill();
            }

            for(let j=0; j<5; j++) {
                ctx.save(); ctx.rotate((j/5)*Math.PI*2);
                ctx.fillStyle = i<6 ? '#fff' : `rgba(255,183,197,${1-prg})`;
                ctx.beginPath(); ctx.ellipse(sz*0.5,0,sz,sz*0.5,0,0,Math.PI*2); ctx.fill();
                ctx.restore();
            }
            ctx.restore();
        }
    }

    class Petal {
        constructor(x, y, burst = false) {
            this.x = x; this.y = y;
            this.vx = burst ? (Math.random()-0.5)*15 : (Math.random()-0.5)*2;
            this.vy = burst ? (Math.random()-0.5)*15 : Math.random()*2+1;
            this.sz = Math.random()*4+3; this.rot = Math.random()*Math.PI*2; this.timer = 0; this.burst = burst;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.timer++;
            if(this.y > h + 20) this.y = -20;
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot + this.timer*0.04);
            ctx.fillStyle = '#ffb7c5'; ctx.beginPath(); ctx.ellipse(0,0,this.sz,this.sz/1.8,0,0,Math.PI*2); ctx.fill(); ctx.restore();
        }
    }

    let petals = [];
    let step = 0;

    const quizData = [
        { q: "С чего должно начинаться идеальное утро?", a: ["С кофе и тишины", "С охапки тюльпанов", "С теплых слов"] },
        { q: "Какой цвет лучше всего передает весну?", a: ["Нежно-розовый", "Ярко-зеленый", "Небесно-голубой"] },
        { q: "Твоя суперсила на эту весну?", a: ["Излучать счастье", "Дарить нежность", "Вдохновлять всех"] },
        { q: "Какой аромат у счастья?", a: ["Цветущая сакура", "Свежий дождь", "Домашний уют"] },
        { q: "Идеальный подарок — это...", a: ["Сюрприз", "Душа и внимание", "Эмоции"] },
        { q: "О чем мечтается сегодня?", a: ["О путешествиях", "О спокойствии", "О переменах"] },
        { q: "Веришь ли ты в чудеса?", a: ["Да, они повсюду", "Я сама их творю", "Жду главное!"] }
    ];

    function startExperience() {
        state = 'sakura';
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-card').style.display = 'block';
        if(typeof confetti === 'function') {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffb7c5', '#fff'] });
        }
        renderQuestion();
    }

    function renderQuestion() {
        if (step >= quizData.length) {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('final-card').style.display = 'block';
            setInterval(() => { if(petals.length < 200) petals.push(new Petal(Math.random()*w, -20)); }, 100);
            return;
        }
        const data = quizData[step];
        document.getElementById('q-num').innerText = `Вопрос ${step + 1} из ${quizData.length}`;
        document.getElementById('q-text').innerText = data.q;
        const box = document.getElementById('q-options');
        box.innerHTML = ''; 
        data.a.forEach(ans => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; 
            btn.innerText = ans;
            btn.onclick = () => { 
                if(typeof confetti === 'function') confetti({particleCount: 20, spread: 40, colors: ['#ffb7c5']}); 
                step++; 
                renderQuestion(); 
            };
            box.appendChild(btn);
        });
    }

    const btnNo = document.getElementById('btn-no'), btnYes = document.getElementById('btn-yes');
    const moveNo = () => {
        btnNo.style.position = 'fixed';
        btnNo.style.left = Math.random() * (window.innerWidth - 150) + 'px';
        btnNo.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        yesScale += 0.3; 
        btnYes.style.transform = `scale(${yesScale})`;
    };
    btnNo.onmouseover = moveNo;
    btnNo.ontouchstart = (e) => { e.preventDefault(); moveNo(); };

    function loop() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.15)'; 
        ctx.fillRect(0, 0, w, h);
        if (state === 'dragon') {
            drawDragon();
        } else {
            petals.forEach((p, i) => { 
                p.update(); 
                p.draw(); 
                if (p.timer > 1000) petals.splice(i, 1); 
            });
        }
        requestAnimationFrame(loop);
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', e => { 
        mouse.x = e.touches[0].clientX; 
        mouse.y = e.touches[0].clientY; 
    }, {passive:false});
    
    loop();
</script>
