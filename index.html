<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 МАРТА / DRAGON SPECIAL</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --pink: #ffb7c5; --dark-pink: #e096a5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        .ui { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #choice-screen { text-align: center; width: 100%; padding: 20px; }
        /* Кнопки теперь всегда в ряд и не накладываются */
        .btns-row { 
            display: flex; 
            gap: 30px; 
            margin-top: 60px; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 200px;
        }
        
        .btn { 
            padding: 18px 45px; 
            border: 2px solid var(--pink); 
            background: none; 
            color: #fff; 
            cursor: pointer; 
            font-size: 18px; 
            border-radius: 12px; 
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            white-space: nowrap;
        }
        
        #btn-yes { background: var(--pink); color: #000; font-weight: 800; border: none; }
        #btn-no { position: relative; transition: all 0.3s ease; }

        #quiz, #final { 
            display: none; 
            width: 90%; 
            max-width: 480px; 
            background: rgba(10, 10, 10, 0.9); 
            padding: 40px; 
            border: 1px solid #333; 
            backdrop-filter: blur(15px); 
            border-radius: 24px; 
            text-align: center;
            animation: appear 0.5s ease;
        }
        @keyframes appear { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .q-title { font-size: 24px; margin-bottom: 30px; color: var(--pink); font-weight: 300; }
        .option { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #444; 
            margin-bottom: 12px; 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            cursor: pointer; 
            border-radius: 12px; 
            font-size: 16px;
            transition: 0.3s;
        }
        .option:hover { border-color: var(--pink); background: rgba(255,183,197,0.15); transform: translateX(8px); }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
    <div id="choice-screen">
        <h1 style="font-weight: 200; letter-spacing: 10px; color: #555; text-transform: uppercase;">Начнем наше приключение?</h1>
        <div class="btns-row">
            <button id="btn-yes" class="btn" onclick="startQuiz()">ДА</button>
            <button id="btn-no" class="btn">НЕТ</button>
        </div>
    </div>

    <div id="quiz">
        <div class="q-title" id="q-text"></div>
        <div id="options"></div>
    </div>

    <div id="final">
        <h1 class="q-title">С 8 Марта! ✨</h1>
        <p style="line-height: 1.8; color: #ccc;">Пусть этот день будет полон волшебства, а твоя жизнь напоминает прекрасный танец весенних лепестков. Ты достойна самого лучшего!</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, mouse = { x: -200, y: -200 }, state = 'dragon', yesScale = 1;

    // Параметры ДЕТАЛИЗИРОВАННОГО дракона
    const segments = [];
    const numSegments = 60;
    for(let i=0; i<numSegments; i++) segments.push({x: -100, y: -100, angle: 0});

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();

    class Petal {
        constructor(x, y, type = 'normal') {
            this.x = x; this.y = y;
            this.type = type;
            // "Метеорный" разлет при взрыве
            this.vx = type === 'burst' ? (Math.random() - 0.5) * 45 : (Math.random() - 0.5) * 2;
            this.vy = type === 'burst' ? (Math.random() - 0.5) * 45 : Math.random() * 2 + 1;
            this.size = Math.random() * 4 + 3;
            this.rot = Math.random() * Math.PI * 2;
            this.timer = 0;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.timer++;
            if(this.type === 'burst' && this.timer > 12) {
                this.vx *= 0.88; this.vy = this.vy * 0.88 + 0.6; // Резкое замедление метеора
            }
            if(this.y > h + 20) this.y = -20;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rot + this.timer * 0.04);
            ctx.fillStyle = '#ffb7c5';
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size/1.6, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    let petals = [];

    // Логика кнопок
    const btnNo = document.getElementById('btn-no');
    const btnYes = document.getElementById('btn-yes');

    const moveNo = () => {
        btnNo.style.position = 'fixed';
        btnNo.style.left = (Math.random() * (w - 150) + 75) + 'px';
        btnNo.style.top = (Math.random() * (h - 100) + 50) + 'px';
        yesScale += 0.2;
        btnYes.style.transform = `scale(${yesScale})`;
    };
    btnNo.addEventListener('mouseenter', moveNo);
    btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moveNo(); });

    // КВИЗ
    const quizData = [
        { q: "Какой аромат весны тебе ближе?", a: ["Свежесть после дождя", "Первые цветы", "Утренний кофе"] },
        { q: "Твое идеальное весеннее приключение?", a: ["Спонтанная поездка", "Пикник в парке", "Уютный вечер с книгой"] },
        { q: "Какую суперсилу выберешь сегодня?", a: ["Излучать счастье", "Вдохновлять других", "Останавливать время"] }
    ];
    let curQ = 0;

    function startQuiz() {
        state = 'sakura';
        // Взрыв из всех сегментов дракона
        segments.forEach(s => {
            for(let i=0; i<6; i++) petals.push(new Petal(s.x, s.y, 'burst'));
        });
        document.getElementById('choice-screen').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        confetti({ particleCount: 200, spread: 80, colors: ['#ffb7c5', '#ffffff'] });
        renderQuiz();
    }

    function renderQuiz() {
        if (curQ >= quizData.length) {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('final').style.display = 'block';
            return;
        }
        document.getElementById('q-text').innerText = quizData[curQ].q;
        const box = document.getElementById('options');
        box.innerHTML = '';
        quizData[curQ].a.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option'; b.innerText = opt;
            b.onclick = () => { 
                curQ++; // Важно: увеличиваем счетчик для следующего вопроса
                renderQuiz(); 
            };
            box.appendChild(b);
        });
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

    function drawDragon() {
        // Голова следует за мышью
        segments[0].x += (mouse.x - segments[0].x) * 0.25;
        segments[0].y += (mouse.y - segments[0].y) * 0.25;

        for (let i = 1; i < numSegments; i++) {
            const s = segments[i];
            const prev = segments[i-1];
            s.x += (prev.x - s.x) * 0.35;
            s.y += (prev.y - s.y) * 0.35;
            s.angle = Math.atan2(s.y - prev.y, s.x - prev.x);

            // Отрисовка "чешуи" (лепестков) для каждого сегмента
            const sizeBase = (1 - i/numSegments) * 18 + 4;
            for(let j=0; j<2; j++) {
                ctx.save();
                ctx.translate(s.x + Math.sin(i*0.3 + j)*8, s.y + Math.cos(i*0.3 + j)*8);
                ctx.rotate(s.angle + Math.sin(Date.now()*0.005 + i*0.2) * 0.5);
                ctx.fillStyle = `rgba(255, 183, 197, ${1 - i/numSegments})`;
                ctx.beginPath();
                ctx.ellipse(0, 0, sizeBase, sizeBase/1.8, 0, 0, Math.PI*2);
                ctx.fill();
                // Детализация головы
                if(i < 5) {
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath(); ctx.arc(-sizeBase/3, -sizeBase/4, sizeBase/5, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }
    }

    function anim() {
        ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(0,0,w,h);
        
        if (state === 'dragon') {
            drawDragon();
            if(Math.random() < 0.15) petals.push(new Petal(Math.random()*w, -20));
        }
        
        petals.forEach((p, i) => {
            p.update(); p.draw();
            if(p.y > h + 50) petals.splice(i, 1);
        });
        
        // Фоновый листопад никогда не прекращается
        if(petals.length < 80) petals.push(new Petal(Math.random()*w, -20));
        
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
