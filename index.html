<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Марта / Digital Art</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --black: #050505; --pink: #ffb7c5; --blue: #00f2ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background: var(--black); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-layer { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .header { position: absolute; top: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; font-size: 10px; letter-spacing: 2px; color: #333; text-transform: uppercase; }
        .instruction { font-size: 16px; font-weight: 300; text-align: center; color: var(--pink); opacity: 0.8; transition: 0.5s; }
        #final-msg { display: none; width: 85%; max-width: 400px; text-align: left; animation: fadeIn 2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .result-phrase { font-size: 24px; line-height: 1.3; font-weight: 500; margin-bottom: 25px; color: var(--pink); }
        .code-box { border-left: 2px solid var(--blue); padding-left: 20px; margin-bottom: 30px; }
        .code-label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .code-val { color: var(--blue); font-size: 22px; font-weight: 800; font-family: monospace; }
        .ps-text { font-size: 10px; color: #333; line-height: 1.5; border-top: 1px solid #111; padding-top: 20px; }
        #prog { position: absolute; bottom: 40px; font-size: 9px; color: var(--blue); letter-spacing: 2px; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-layer">
    <div class="header"><span>8 МАРТА</span><span>EDITION 1/1</span></div>
    <div id="hint" class="instruction">Управляй материей, <br>чтобы пробудить весну</div>
    <div id="final-msg">
        <div class="result-phrase">Ты — исключительная энергия, создающая красоту в каждом моменте.</div>
        <div class="code-box">
            <span class="code-label">Твой секретный код:</span>
            <span class="code-val" id="res-code">#B1627</span>
        </div>
        <div class="ps-text">
            Сайт разработан специально для тебя. <br>Вероятность такого момента — 0.41%.
        </div>
    </div>
    <div id="prog">ЭНЕРГИЯ: 0%</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, petals = [], swarm = [];
    let mouse = { x: -1000, y: -1000, active: false };
    let progress = 0;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    class Petal {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * width;
            this.y = -20;
            this.size = Math.random() * 6 + 3;
            this.speed = Math.random() * 0.8 + 0.4;
            this.wind = Math.random() * 0.5 - 0.25;
            this.angle = Math.random() * Math.PI * 2;
        }
        update() {
            this.y += this.speed;
            this.x += this.wind;
            this.angle += 0.01;
            if (this.y > height) this.reset();
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            ctx.fillStyle = '#ffb7c5'; ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size / 1.6, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.restore();
        }
    }

    class SwarmPart {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = Math.random() * 2 - 1;
            this.vy = Math.random() * 2 - 1;
            this.size = Math.random() * 2 + 1;
        }
        update() {
            if (mouse.active) {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 500) {
                    this.vx += (dx / dist) * 0.5;
                    this.vy += (dy / dist) * 0.5;
                }
            }
            this.vx *= 0.95; this.vy *= 0.95;
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > width) this.vx *= -1;
            if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() {
            ctx.fillStyle = '#00f2ff';
            ctx.shadowBlur = 5; ctx.shadowColor = '#00f2ff';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill(); ctx.shadowBlur = 0;
        }
    }

    for (let i = 0; i < 40; i++) petals.push(new Petal());
    for (let i = 0; i < 150; i++) swarm.push(new SwarmPart());

    function handleInput(e) {
        mouse.active = true;
        mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
        mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
        if (progress < 100) {
            progress += 0.3;
            document.getElementById('prog').innerText = `ЭНЕРГИЯ: ${Math.floor(progress)}%`;
            document.getElementById('hint').style.opacity = '0';
            if (progress >= 100) finish();
        }
    }

    function finish() {
        document.getElementById('prog').style.display = 'none';
        document.getElementById('final-msg').style.display = 'block';
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) document.getElementById('res-code').innerText = code;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffb7c5', '#00f2ff', '#ffffff'] });
    }

    function animate() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; ctx.fillRect(0, 0, width, height);
        petals.forEach(p => { p.update(); p.draw(); });
        swarm.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    ['mousedown', 'touchstart', 'mousemove', 'touchmove'].forEach(evt => {
        window.addEventListener(evt, (e) => {
            if (evt.includes('move') && !mouse.active) return;
            handleInput(e);
        });
    });
    window.addEventListener('mouseup', () => mouse.active = false);
    window.addEventListener('touchend', () => mouse.active = false);

    init(); animate();
</script>
</body>
</html>
