<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Марта / Digital Art</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --black: #000000; --pink: #ffb7c5; --blue: #00e1ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background: var(--black); color: #fff; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .ui { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .hint { font-size: 14px; letter-spacing: 2px; color: var(--blue); text-transform: uppercase; opacity: 0.6; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        #final { display: none; width: 85%; max-width: 400px; animation: show 1s ease forwards; }
        @keyframes show { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
        .msg { font-size: 28px; font-weight: 600; line-height: 1.2; margin-bottom: 20px; color: var(--pink); text-shadow: 0 0 20px rgba(255,183,197,0.4); }
        .code-tag { background: var(--blue); color: #000; padding: 5px 12px; font-weight: 900; font-family: monospace; font-size: 20px; display: inline-block; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
    <div id="hint" class="hint">Управляй роем частиц</div>
    <div id="final">
        <div class="msg">Весна начинается с тебя.</div>
        <div class="code-tag" id="res-code">#CODE</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, petals = [], particles = [], mouse = { x: -100, y: -100, down: false }, charge = 0;

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }

    class Petal {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w; this.y = -20;
            this.sz = Math.random() * 5 + 2;
            this.sp = Math.random() * 1 + 0.5;
            this.ang = Math.random() * Math.PI * 2;
        }
        draw() {
            this.y += this.sp; this.ang += 0.01;
            if (this.y > h) this.reset();
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.ang);
            ctx.fillStyle = '#ffb7c5'; ctx.beginPath();
            ctx.ellipse(0, 0, this.sz, this.sz/1.5, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }
    }

    class Part {
        constructor() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
            this.baseX = this.vx; this.baseY = this.vy;
        }
        draw() {
            if (mouse.down) {
                let dx = mouse.x - this.x, dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                this.vx += (dx / dist) * 0.8; this.vy += (dy / dist) * 0.8;
            } else {
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy += (Math.random() - 0.5) * 0.1;
            }
            this.vx *= 0.94; this.vy *= 0.94;
            this.x += this.vx; this.y += this.vy;

            if (this.x < 0 || this.x > w) this.vx *= -1;
            if (this.y < 0 || this.y > h) this.vy *= -1;

            ctx.fillStyle = '#00e1ff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#00e1ff';
            ctx.fillRect(this.x, this.y, 2, 2);
            ctx.shadowBlur = 0;
        }
    }

    for (let i = 0; i < 40; i++) petals.push(new Petal());
    for (let i = 0; i < 200; i++) particles.push(new Part());

    function act(e) {
        mouse.down = true;
        mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
        mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
        if (charge < 100) {
            charge += 0.4;
            document.getElementById('hint').style.display = 'none';
            if (charge >= 100) {
                document.getElementById('final').style.display = 'block';
                const code = new URLSearchParams(window.location.search).get('code');
                if (code) document.getElementById('res-code').innerText = code;
                confetti({ particleCount: 150, spread: 70, colors: ['#ffb7c5', '#00e1ff'] });
            }
        }
    }

    function anim() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
        petals.forEach(p => p.draw());
        particles.forEach(p => p.draw());
        requestAnimationFrame(anim);
    }

    window.addEventListener('resize', init);
    ['mousedown', 'touchstart', 'mousemove', 'touchmove'].forEach(ev => {
        window.addEventListener(ev, (e) => {
            if (ev.includes('move') && !mouse.down) return;
            act(e);
        });
    });
    window.addEventListener('mouseup', () => mouse.down = false);
    window.addEventListener('touchend', () => mouse.down = false);

    init(); anim();
</script>
</body>
</html>
