<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Марта 1/59049</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --neon: #d2f55e; --black: #0b0b0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; padding: 25px; }
        .top-bar { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 2px; color: #444; margin-bottom: 30px; text-transform: uppercase; font-weight: 600; }
        .progress-line { width: 100%; height: 1px; background: #222; margin-bottom: 30px; }
        #bar { height: 1px; background: var(--neon); width: 0%; transition: 0.6s ease; box-shadow: 0 0 10px var(--neon); }
        .q-text { font-size: 20px; font-weight: 300; line-height: 1.4; margin-bottom: 30px; min-height: 80px; letter-spacing: -0.5px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn { background: none; border: 1px solid #222; color: #888; padding: 18px; text-align: left; cursor: pointer; transition: 0.2s; font-size: 14px; border-radius: 0; outline: none; -webkit-appearance: none; }
        .btn:hover { border-color: var(--neon); color: #fff; background: #111; }
        .btn-start { border-color: var(--neon); color: var(--neon); text-align: center; font-weight: 700; letter-spacing: 2px; margin-top: 40px; width: 100%; }
        #quiz-screen, #final-screen { display: none; }
        #start-screen { display: block; text-align: center; }
        .result-phrase { font-size: 19px; line-height: 1.4; font-weight: 500; margin-bottom: 30px; color: #fff; text-align: left; }
        .code-box { border-left: 2px solid var(--neon); padding-left: 20px; text-align: left; margin-bottom: 30px; }
        .code-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        #res-code { color: var(--neon); font-size: 20px; font-weight: 800; font-family: monospace; }
        .ps-text { font-size: 11px; color: #333; line-height: 1.5; text-align: left; border-top: 1px solid #1a1a1a; padding-top: 20px; }
    </style>
</head>
<body>

<div class="app" id="start-screen">
    <div class="top-bar"><span>8 МАРТА</span><span>1/59049</span></div>
    <div class="q-text" style="font-size: 22px; min-height: auto;">Ваши ответы никто <br>не узнает)</div>
    <button class="btn btn-start" onclick="startQuiz()">НАЧАТЬ ТЕСТ</button>
</div>

<div class="app" id="quiz-screen">
    <div class="top-bar">
        <span id="u-name" style="color:#fff"></span>
        <span>ТАКЖЕ ОТВЕТИЛ КТО-ТО ЕЩЕ: <span id="u-val">100</span>%</span>
    </div>
    <div class="progress-line"><div id="bar"></div></div>
    <div class="q-text" id="q-text">Загрузка...</div>
    <div id="opt-box" class="options"></div>
</div>

<div class="app" id="final-screen">
    <div class="top-bar" style="color:var(--neon)">АНАЛИЗ ЗАВЕРШЕН</div>
    <div class="result-phrase" id="res-text"></div>
    <div class="code-box">
        <span class="code-label">Твой код сертификата:</span>
        <span id="res-code"></span>
    </div>
    <div class="ps-text" id="ps-box"></div>
</div>

<script>
    const tree = {
        root: { q: "Что станет отправной точкой сегодня?", a: [
            {t: "Движение", branch: "urban", res: "Стремительная"},
            {t: "Тишина", branch: "home", res: "Гармоничная"},
            {t: "Стиль", branch: "art", res: "Изысканная"}
        ]},
        urban: [
            {q: "Твой идеальный город?", a: ["Нью-Йорк", "Токио", "Берлин"], r: ["энергичная", "быстрая", "активная"]},
            {q: "Звук твоего утра?", a: ["Шум проспекта", "Сирены", "Бодрый бит"], r: ["личность,", "натура,", "фигура,"]},
            {q: "Твой цвет ночи?", a: ["Яркий неон", "Черный винил", "Металл"], r: ["смелая,", "заряженная,", "дерзкая,"]},
            {q: "Твое место силы?", a: ["Крыша дома", "Ночной клуб", "Спортзал"], r: ["обожающая драйв,", "взламывающая систему,", "ищущая масштаб,"]},
            {q: "Твой выбор в баре?", a: ["Энергетик", "Кофе", "Коктейль"], r: ["всегда решительная,", "уверенная,", "непредсказуемая,"]},
            {q: "Твой вечер — это...", a: ["Вечеринка", "Гонка", "Встреча"], r: ["в центре событий", "в ритме города", "в свете софитов"]},
            {q: "Как ты решаешь дела?", a: ["Сразу", "С боем", "На лету"], r: ["с азартом,", "с характером,", "с вызовом,"]},
            {q: "Твоя суперсила?", a: ["Скорость", "Власть", "Харизма"], r: ["зажигая мир", "меняя правила", "диктуя условия"]},
            {q: "Твой манифест?", a: ["Только вперед", "Всё и сразу", "Быть первой"], r: ["ради победы.", "ради успеха.", "ради мечты."] }
        ],
        home: [
            {q: "Твой любимый завтрак?", a: ["Кофе и книга", "Фрукты", "Выпечка"], r: ["нежная", "спокойная", "чистая"]},
            {q: "Твой свет в комнате?", a: ["Свечи", "Солнце", "Гирлянды"], r: ["душа,", "натура,", "личность,"]},
            {q: "Твой утренний ритуал?", a: ["Медитация", "Уход", "Сон"], r: ["мудрая,", "искренняя,", "добрая,"]},
            {q: "Твоя ткань?", a: ["Шелк", "Кашемир", "Хлопок"], r: ["ценящая покой,", "любящая уют,", "ищущая баланс,"]},
            {q: "Твой запах?", a: ["Цветы", "Ваниль", "Дождь"], r: ["всегда теплая,", "невероятно мягкая,", "тонко чувствующая,"]},
            {q: "Твой вечер — это...", a: ["Ванна", "Плед", "Кино"], r: ["в домашней тишине", "в мягком свете", "в кругу своих"]},
            {q: "Как ты решаешь дела?", a: ["Плавно", "Мудро", "Тихо"], r: ["с легким сердцем,", "с ясным умом,", "с верой в лучшее,"]},
            {q: "Твоя черта?", a: ["Скромность", "Мир", "Улыбка"], r: ["сохраняя свет", "давая тепло", "даря гармонию"]},
            {q: "Твой манифест?", a: ["Быть собой", "Жить моментом", "Дарить радость"], r: ["ради любви.", "ради тепла.", "ради счастья."] }
        ],
        art: [
            {q: "Твой вид искусства?", a: ["Кино", "Живопись", "Мода"], r: ["творческая", "эстетичная", "свободная"]},
            {q: "Твой способ выражения?", a: ["Фото", "Текст", "Стиль"], r: ["личность,", "муза,", "натура,"]},
            {q: "Твое место?", a: ["Театр", "Музей", "Галерея"], r: ["изысканная,", "необычная,", "вдохновленная,"]},
            {q: "Твой декор?", a: ["Цветы", "Статуи", "Картины"], r: ["меняющая смыслы,", "создающая тренды,", "управляющая взглядом,"]},
            {q: "Твой аромат?", a: ["Пудровый", "Пряный", "Сладкий"], r: ["невероятно притягательная,", "очень особенная,", "всегда стильная,"]},
            {q: "Твой вечер — это...", a: ["Показ", "Премьера", "Ужин"], r: ["в лучах славы", "в центре кадра", "в красивом месте"]},
            {q: "Как ты решаешь дела?", a: ["Стильно", "Красиво", "Легко"], r: ["с безупречным вкусом,", "с шармом,", "с грацией,"]},
            {q: "Твоя черта?", a: ["Шик", "Эстетика", "Вкус"], r: ["воплощая мечту", "привлекая внимание", "создавая историю"]},
            {q: "Твой манифест?", a: ["Всё — искусство", "Жить ярко", "Творить"], r: ["ради красоты.", "ради вдохновения.", "ради искусства."] }
        ]
    };

    let step = 0, currentBranch = null, picks = [], url = new URLSearchParams(window.location.search);
    const name = url.get('name');
    if (name) document.getElementById('u-name').innerText = name.toUpperCase();

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        render();
    }

    function render() {
        if (step >= 10) return finish();
        const box = document.getElementById('opt-box');
        box.innerHTML = '';
        let currentData;

        if (step === 0) {
            currentData = tree.root;
            currentData.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt.t;
                b.onclick = () => { 
                    currentBranch = opt.branch; 
                    picks.push(opt.res); 
                    step++; 
                    render(); 
                };
                box.appendChild(b);
            });
        } else {
            currentData = tree[currentBranch][step - 1];
            currentData.a.forEach((text, i) => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = text;
                b.onclick = () => { 
                    picks.push(currentData.r[i]); 
                    step++; 
                    render(); 
                };
                box.appendChild(b);
            });
        }
        document.getElementById('q-text').innerText = currentData.q;
        const uVal = (100 / Math.pow(3, step)).toFixed(step < 3 ? 1 : 4);
        document.getElementById('bar').style.width = (step * 10) + '%';
        document.getElementById('u-val').innerText = uVal;
    }

    function finish() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        document.getElementById('res-text').innerText = picks.join(' ');
        document.getElementById('res-code').innerText = url.get('code') || '#B1627';
        document.getElementById('ps-box').innerText = "P.s. Данный сайт был разработан специально для вас, шанс на такой же ответ у других 1 к 59049, что примерно 0,0017% (Это как если бы одновременно подумать об одном и том же числе от 1 до 59 049)";
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#d2f55e', '#ffffff'] });
    }
</script>
</body>
</html>
